<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caves & Mines · Valencia Region</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&family=Fraunces:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#0a0908;--s1:#141210;--s2:#1c1917;--s3:#232120;
  --b1:#2c2825;--b2:#3d3835;--b3:#4d4845;
  --tx:#e8e4df;--t2:#a39c96;--t3:#6b635d;--t4:#47423e;
  --amber:#d97706;--al:#fbbf24;--ad:#92400e;
  --green:#16a34a;--gl:#4ade80;
  --blue:#1d4ed8;--bl:#60a5fa;
  --yellow:#b45309;--yl:#fcd34d;
  --red:#991b1b;--rl:#f87171;
  --purple:#7c3aed;--pl:#c4b5fd;
  --cyan:#0891b2;--cl:#67e8f9;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'DM Mono',monospace;color:var(--tx);display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
header{background:var(--s1);border-bottom:1px solid var(--b1);padding:11px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:200}
.hlogo{font-size:26px;line-height:1}
.htitle h1{font-family:'Fraunces',serif;font-size:20px;font-weight:700;letter-spacing:-.3px}
.htitle p{font-size:12px;color:var(--t3);letter-spacing:.08em;margin-top:2px}
.hlegend{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-left:auto}
.hleg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2)}
.hleg svg{flex-shrink:0}

/* ── LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}
#map{flex:0 0 56%;position:relative;background:#0d0c0b}
.panel{flex:1;background:var(--s1);border-left:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── FILTERS ── */
.fbar{background:var(--s2);border-bottom:1px solid var(--b1);padding:10px 13px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.fbar input{background:var(--s1);border:1px solid var(--b2);border-radius:5px;padding:6px 10px;font-size:13px;font-family:'DM Mono',monospace;color:var(--tx);width:150px;outline:none;transition:border .15s}
.fbar input:focus{border-color:var(--amber)}
.fbtn{padding:6px 13px;border-radius:5px;border:1px solid var(--b2);cursor:pointer;font-size:12px;font-family:'DM Mono',monospace;background:var(--s1);color:var(--t2);letter-spacing:.04em;transition:all .15s;white-space:nowrap}
.fbtn:hover{color:var(--tx);border-color:var(--b3)}
.fbtn.active{background:var(--amber);color:#fff;border-color:var(--amber)}
.fcount{font-size:12px;color:var(--t4);margin-left:auto}
.fsep{width:1px;background:var(--b1);height:18px;flex-shrink:0}

/* ── LIST ── */
.plist{overflow-y:auto;flex:1}
.ci{padding:13px 15px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s;display:flex;gap:10px;align-items:flex-start}
.ci:hover{background:var(--s2)}
.ci.sel{background:#140d00;border-left:3px solid var(--amber)}
.ci-sym{width:20px;height:20px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:14px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-sub{font-size:12px;color:var(--t3);margin-top:2px}
.ckm{color:var(--al)}
.apill{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:700;flex-shrink:0;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.ap-free{background:#052e16;color:var(--gl)}
.ap-tourist{background:#0c1a3e;color:var(--bl)}
.ap-permit{background:#1c0f00;color:var(--yl)}
.ap-closed{background:#2d0000;color:var(--rl)}

/* ── DETAIL ── */
.pdetail{flex:1;overflow-y:auto;display:none;flex-direction:column}
.pdetail.on{display:flex}
.dphoto{width:100%;height:170px;object-fit:cover;display:block}
.dphoto-ph{width:100%;height:95px;background:linear-gradient(135deg,#1a1510 0%,#2c2018 100%);display:flex;align-items:center;justify-content:center;font-size:36px}
.dbody{padding:16px 14px;flex:1}
.backbtn{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b2);color:var(--t2);padding:6px 12px;border-radius:5px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;margin-bottom:14px;transition:color .15s;letter-spacing:.04em}
.backbtn:hover{color:var(--tx)}
.dkind{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.dname{font-family:'Fraunces',serif;font-size:24px;font-weight:700;line-height:1.2;margin-bottom:5px}
.dloc{font-size:13px;color:var(--t2);margin-bottom:6px}
.dkm{color:var(--al);font-weight:700}
.dhigh{font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--al);border-left:2px solid var(--amber);padding-left:10px;margin-bottom:13px;line-height:1.6}

/* ── ACCESS BAR ── */
.abar{border-radius:6px;padding:10px 12px;margin-bottom:11px;display:flex;align-items:center;gap:10px}
.abar.free{background:#052e16;border:1px solid #14532d}
.abar.tourist{background:#0c1a3e;border:1px solid #1e3a8a}
.abar.permit{background:#1c0f00;border:1px solid #78350f}
.abar.closed{background:#2d0000;border:1px solid #7f1d1d}
.abar-lbl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.abar.free .abar-lbl{color:var(--gl)}.abar.tourist .abar-lbl{color:var(--bl)}
.abar.permit .abar-lbl{color:var(--yl)}.abar.closed .abar-lbl{color:var(--rl)}
.abar-sub{font-size:12px;color:var(--t2);margin-top:2px}

/* ── SCORE ROW ── */
.srow{display:flex;gap:5px;margin-bottom:12px}
.scell{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:9px 4px;text-align:center}
.slabel{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.sval{font-size:17px;font-weight:700}
.s-epic{color:var(--al)}.s-danger{color:var(--rl)}.s-size{color:var(--cl)}.s-wet{color:var(--bl)}

/* ── STATS GRID ── */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:11px}
.sc{background:var(--s2);border:1px solid var(--b1);border-radius:5px;padding:8px 8px}
.sl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.sv{font-size:13px;color:var(--tx);font-weight:700;line-height:1.3}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--s2)}
.tab{padding:10px 16px;font-size:13px;font-family:'DM Mono',monospace;cursor:pointer;color:var(--t3);letter-spacing:.04em;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--al);border-bottom-color:var(--amber)}
.tabp{display:none}.tabp.on{display:block}

/* ── SECTIONS ── */
.sec{margin-bottom:13px}
.sh{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:6px}
.sec p{font-size:13px;color:var(--t2);line-height:1.75}
.rlist{list-style:none}
.rlist li{font-size:13px;color:var(--t2);padding:4px 0;border-bottom:1px solid var(--b1);display:flex;gap:8px;line-height:1.55}
.rlist li:last-child{border:none}
.rlist li::before{content:"→";color:var(--amber);flex-shrink:0}

/* ── RISK BOX ── */
.rbox{background:#180303;border:1px solid #7f1d1d;border-radius:6px;padding:11px 10px;margin-bottom:11px}
.rbox .sh{color:var(--rl);border-color:#3d0000}
.rbox .rlist li::before{color:var(--rl)}
.rbox .rlist li{color:#fca5a5;border-color:#3d0000}

/* ── PERMIT BOX ── */
.pbox{background:#120900;border:1px solid #78350f;border-radius:6px;padding:11px 10px;margin-bottom:11px}
.pbox .sh{color:var(--yl);border-color:#431407}
.pbox p{font-size:13px;color:var(--yl);line-height:1.75}

/* ── OPERATORS ── */
.opbox{background:#060c12;border:1px solid #0c2a4a;border-radius:6px;padding:11px 10px;margin-bottom:11px}
.opbox .sh{color:var(--cl);border-color:#0c2a4a}
.op{padding:7px 0;border-bottom:1px solid #0c2a4a}
.op:last-child{border:none;padding-bottom:0}
.op-name{font-size:13px;font-weight:700;color:var(--cl)}
.op-acts{font-size:12px;color:var(--t2);margin-top:3px}
.op-price{font-size:12px;color:var(--al);margin-top:2px}
.op-link{font-size:12px;color:var(--bl);text-decoration:none;border-bottom:1px solid #1e3a8a}

/* ── AIR QUALITY ── */
.airbox{background:#0a0a14;border:1px solid #3730a3;border-radius:6px;padding:11px 10px;margin-bottom:11px}
.airbox .sh{color:var(--pl);border-color:#3730a3}
.air-item{font-size:13px;color:var(--pl);line-height:1.65;padding:4px 0;border-bottom:1px solid #1e1b4b}
.air-item:last-child{border:none}
.air-src{font-size:11px;color:var(--t3);margin-top:2px}

/* ── COMMUNITY ── */
.cbox{background:#0c0c1a;border:1px solid #2d2d5e;border-radius:6px;padding:11px 10px;margin-bottom:11px}
.cbox .sh{color:var(--pl);border-color:#2d2d5e}
.cnote{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #1a1a3a}
.cnote:last-child{margin:0;padding:0;border:none}
.cntxt{font-size:13px;color:#c4b5fd;line-height:1.65;margin-bottom:4px}
.cmeta{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.stag{font-size:11px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.04em}
.st-trip{background:#1a2a1a;color:#4ade80}.st-forum{background:#1a1a2a;color:#818cf8}
.st-off{background:#1a1200;color:#fcd34d}.st-resc{background:#2d0000;color:#f87171}
.st-wiki{background:#1a2a2a;color:#22d3ee}.st-unv{background:#2a2a2a;color:#a8a29e}
.crel{font-size:11px;color:var(--t4)}

/* ── SEASON ── */
.srow2{display:flex;gap:3px;margin-top:6px}
.mc{flex:1;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.mg{background:#052e16;color:var(--gl)}.mo{background:#1c1500;color:var(--yl)}.mb{background:#2d0000;color:var(--rl)}

/* ── VIDEOS ── */
.vbox{margin-bottom:11px}
.vbox .sh{color:var(--rl);border-color:var(--b1)}
.vlink{display:flex;align-items:center;gap:8px;background:#1a0808;border:1px solid #7f1d1d;border-radius:5px;padding:9px 12px;margin-bottom:6px;text-decoration:none;color:var(--rl);font-size:13px;transition:background .15s}
.vlink:hover{background:#2d0a0a}
.vlink:last-child{margin:0}

/* ── DIRS BTN ── */
.dirbtn{display:flex;align-items:center;gap:8px;background:#0c2044;border:1px solid #1e3a8a;border-radius:6px;padding:10px 12px;color:var(--bl);font-family:'DM Mono',monospace;font-size:13px;text-decoration:none;margin-bottom:11px;transition:background .15s}
.dirbtn:hover{background:#112a5e}

/* ── EMERGENCY ── */
.embox{background:var(--s2);border-radius:6px;padding:10px 12px;font-size:12px;color:var(--t3);border:1px solid var(--b1);margin-top:8px}
.embox strong{color:var(--t2)}

/* ── SITE LINK ── */
.slink{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--bl);text-decoration:none;border-bottom:1px solid #1e3a8a}

/* ── CUSTOM SCALE BAR ── */
.mscale{background:rgba(12,10,9,.85);border:1px solid var(--b2);border-radius:4px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:9px;color:var(--t2)}
.mscale-row{display:flex;align-items:flex-end;gap:0;margin-bottom:2px}
.mscale-bar{height:6px;border-top:1.5px solid var(--t2);border-right:1.5px solid var(--t2);border-bottom:1.5px solid var(--t2);border-left:none;position:relative;display:flex;align-items:flex-end}
.mscale-bar:first-child{border-left:1.5px solid var(--t2)}
.mscale-bar.alt{background:rgba(255,255,255,.06)}
.mscale-labels{display:flex;gap:0}
.mscale-lbl{font-size:8px;color:var(--t2);text-align:right;padding-right:2px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── LEAFLET OVERRIDES ── */
.leaflet-control-layers{background:var(--s2)!important;border:1px solid var(--b1)!important;color:var(--t2)!important;font-family:'DM Mono',monospace!important;font-size:10px!important}
.leaflet-control-layers-expanded{padding:7px 11px!important}
.leaflet-control-zoom a{background:var(--s2)!important;color:var(--t2)!important;border:1px solid var(--b2)!important}
.leaflet-control-zoom a:hover{background:var(--s3)!important;color:var(--tx)!important}
.leaflet-popup-content-wrapper{background:var(--s2)!important;border:1px solid var(--b2)!important;color:var(--tx)!important;font-family:'DM Mono',monospace!important;font-size:11px!important;border-radius:5px!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important}
.leaflet-popup-tip{background:var(--s2)!important}
.leaflet-popup-close-button{color:var(--t2)!important}

/* ── PULSING SELECTED ── */
@keyframes pulse{0%{transform:scale(1);opacity:.9}50%{transform:scale(1.5);opacity:.3}100%{transform:scale(1);opacity:.9}}
.sel-ring{animation:pulse 1.5s ease-in-out infinite;pointer-events:none}

/* ── MOBILE ── */
@media(max-width:700px){.main{flex-direction:column}#map{flex:0 0 42vh}.panel{flex:1}.hlegend{display:none}.sgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

// ── CUSTOM MULTI-SCALE BAR ──
const MultiScale=L.Control.extend({
  options:{position:'bottomleft'},
  onAdd:function(m){
    const div=L.DomUtil.create('div','mscale');
    this._map=m;this._div=div;
    m.on('zoomend moveend',()=>this._update());
    this._update();
    return div;
  },
  _update:function(){
    const m=this._map;const c=m.getCenter();
    const p1=m.latLngToContainerPoint(c);
    const p2=m.latLngToContainerPoint([c.lat,c.lng+0.01]);
    const pxPer100m=Math.abs(p2.x-p1.x)*1000/(0.01*111320*Math.cos(c.lat*Math.PI/180));
    const segs=[{km:1,alt:false},{km:2,alt:true},{km:5,alt:false},{km:10,alt:true},{km:20,alt:false}];
    let html='<div class="mscale-row">';
    segs.forEach(s=>{
      const px=Math.round(pxPer100m*s.km*10);
      if(px>8&&px<200)html+=`<div class="mscale-bar${s.alt?' alt':''}" style="width:${px}px;min-width:${px}px"></div>`;
    });
    html+='</div><div class="mscale-labels">';
    let lastPx=0;
    segs.forEach(s=>{
      const px=Math.round(pxPer100m*s.km*10);
      if(px>8&&px<200){html+=`<span class="mscale-lbl" style="width:${px}px">${s.km}km</span>`;lastPx+=px;}
    });
    html+='</div>';
    this._div.innerHTML=html;
  }
});
new MultiScale().addTo(map);

// ── MARKER SYMBOLS ──
function makeIcon(cave,selected){
  const col=ACC[cave.access].c;
  const sel=selected;
  const z=map.getZoom();
  const base=Math.max(20,Math.min(42,Math.round(20+(z-7)*3.0)));
  const size=sel?base+10:base;
  const sw=sel?4:2.5;
  let svg='';
  if(cave.kind==='mine'){
    const s2=size*0.7;
    svg=`<polygon points="${size/2},${(size-s2)/2} ${size-(size-s2)/2},${size/2} ${size/2},${size-(size-s2)/2} ${(size-s2)/2},${size/2}" fill="${col}" stroke="white" stroke-width="${sw}" opacity="0.95"/>`;
  } else if(cave.kind==='arch'){
    svg=`<polygon points="${size/2},1 ${size-1},${size-1} 1,${size-1}" fill="${col}" stroke="white" stroke-width="${sw}" opacity="0.95"/>`;
  } else {
    svg=`<circle cx="${size/2}" cy="${size/2}" r="${size/2-sw/2}" fill="${col}" stroke="white" stroke-width="${sw}" opacity="0.95"/>`;
    if(sel){svg+=`<circle cx="${size/2}" cy="${size/2}" r="${size/2+5}" fill="none" stroke="${col}" stroke-width="2.5" class="sel-ring" opacity="0.6"/>`;}
  }
  // Add name label at zoom 13+
  if(map.getZoom()>=13){
    const lbl=cave.name.split('–')[0].split('(')[0].trim().substring(0,22);
    const lw=Math.max(60,lbl.length*7.5);
    return L.divIcon({
      html:`<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><svg width="${size+8}" height="${size+8}" viewBox="0 0 ${size+8} ${size+8}"><defs><filter id="gw2"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="rgba(255,255,255,0.8)"/></filter></defs><g transform="translate(4,4)" filter="url(#gw2)">${svg}</g></svg><div style="background:rgba(12,10,9,.82);color:#fbbf24;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;border:1px solid rgba(255,255,255,.18);white-space:nowrap;max-width:${lw}px;overflow:hidden;text-overflow:ellipsis;pointer-events:none">${lbl}</div></div>`,
      iconSize:[Math.max(size+8,lw+10),size+28],iconAnchor:[Math.max(size+8,lw+10)/2,(size+8)/2],className:''
    });
  }
  const pad=8;const total=size+pad;
  const flt=`<filter id="gw"><feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="rgba(255,255,255,0.8)"/></filter>`;
  return L.divIcon({
    html:`<svg width="${total}" height="${total}" viewBox="0 0 ${total} ${total}"><defs>${flt}</defs><g transform="translate(${pad/2},${pad/2})" filter="url(#gw)">${svg}</g></svg>`,
    iconSize:[total,total],iconAnchor:[total/2,total/2],className:''
  });
}

// ── DRAW ENTRANCES ──
const entranceLines={};
const entranceMarkers={};
function drawEntrances(cave,show){
  if(entranceLines[cave.id]){map.removeLayer(entranceLines[cave.id]);delete entranceLines[cave.id];}
  if(entranceMarkers[cave.id]){entranceMarkers[cave.id].forEach(m=>map.removeLayer(m));delete entranceMarkers[cave.id];}
  if(!show||!cave.entrances||cave.entrances.length<2)return;
  const pts=cave.entrances.map(e=>[e.lat,e.lng]);
  entranceLines[cave.id]=L.polyline(pts,{color:ACC[cave.access].c,weight:2,dashArray:'5,5',opacity:.7}).addTo(map);
  entranceMarkers[cave.id]=cave.entrances.map((e,i)=>{
    if(i===0)return null;
    return L.circleMarker([e.lat,e.lng],{radius:5,fillColor:ACC[cave.access].c,color:'white',weight:1.5,fillOpacity:.8})
      .bindTooltip(`<b>${cave.name}</b><br><small>${e.name}</small>`,{sticky:true}).addTo(map);
  }).filter(Boolean);
}

const mkrs={};
CAVES.forEach(c=>{

  m.on('click',()=>showDetail(c.id));
  m.addTo(map);

});

fetch("https://terramapas.icv.gva.es/spa_icv_eepp_cuevas?service=WFS&version=2.0.0&request=GetFeature&outputFormat=application/json&srsname=EPSG:4326")
  .then(r=>r.json()).then(data=>{

    L.geoJSON(data.features,{

      onEachFeature:(f,layer)=>{
        const n=f.properties.nombre||f.properties.NOMBRE||f.properties.name||"GVA cueva";
        layer.bindPopup(`<b>${n}</b><br><small style="color:#a39c96">GVA official catalogue</small>`);
      }
    }).addTo(map);

// ── FILTERS ──
let curAcc='all',curKind='all',selId=null;
function setAcc(v){
  if(curAcc===v){curAcc='all';v='all';}else curAcc=v;
  ['all','free','tourist','permit','closed'].forEach(x=>document.getElementById('fa-'+x).classList.toggle('active',v===x||x==='all'&&v==='all'));
  document.getElementById('fa-all').classList.toggle('active',v==='all');
  ['free','tourist','permit','closed'].forEach(x=>document.getElementById('fa-'+x).classList.toggle('active',curAcc===x));
  filterAll();
}
function setKind(v){
  if(curKind===v){curKind='all';}else curKind=v;
  ['cave','mine','arch'].forEach(x=>document.getElementById('fk-'+x).classList.toggle('active',curKind===x));
  filterAll();
}
function filterAll(){
  const q=document.getElementById('fsearch').value.toLowerCase();
  let n=0;
  CAVES.forEach(c=>{
    const mA=curAcc==='all'||c.access===curAcc;
    const mK=curKind==='all'||c.kind===curKind;
    const mQ=!q||c.name.toLowerCase().includes(q)||c.town.toLowerCase().includes(q)||c.type.toLowerCase().includes(q);
    const show=mA&&mK&&mQ;
    // map marker visibility
    if(mkrs[c.id]){
      if(show)mkrs[c.id].addTo(map);
      else map.removeLayer(mkrs[c.id]);
    }
    // list item visibility
    const li=document.getElementById('li-'+c.id);
    if(li)li.style.display=show?'':'none';
    if(show)n++;
  });
  document.getElementById('fcount').textContent=n+' shown';
}
function filterList(){filterAll();}

// ── BUILD LIST ──
function buildList(){
  const el=document.getElementById('plist');
  el.innerHTML='';
  const sorted=[...CAVES].sort((a,b)=>a.km-b.km);
  sorted.forEach(c=>{
    const div=document.createElement('div');
    div.className='ci';div.id='li-'+c.id;
    const ac=ACC[c.access];
    const kindSvg=c.kind==='mine'?`<svg width="12" height="12"><polygon points="6,0 12,6 6,12 0,6" fill="${ac.c}" stroke="white" stroke-width="1"/></svg>`:c.kind==='arch'?`<svg width="12" height="12"><polygon points="6,1 11,11 1,11" fill="${ac.c}" stroke="white" stroke-width="1"/></svg>`:`<svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="${ac.c}" stroke="white" stroke-width="1.5"/></svg>`;
    div.innerHTML=`<div class="ci-sym">${kindSvg}</div><div class="ci-info"><div class="ci-name">${c.name}</div><div class="ci-sub">${c.town} · <span class="ckm">~${c.km}km</span> · ${c.type||c.kind}</div></div><div class="apill ${ac.bc}">${ac.l}</div>`;
    div.onclick=()=>showDetail(c.id);
    el.appendChild(div);
  });
  filterAll();
}

// ── SCORE BAR ──
function scoreBar(val,max,color){
  const pct=Math.round(val/max*100);
  return`<div style="height:4px;background:var(--b1);border-radius:2px;margin-top:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${color};border-radius:2px;transition:width .4s"></div></div>`;
}
function epicLabel(n){return n>=9?'World-class':n>=7?'Epic':n>=5?'Notable':n>=3?'Moderate':'Basic'}
function dangerLabel(n){return n>=9?'LETHAL':n>=7?'Very high':n>=5?'Significant':n>=3?'Moderate':'Safe'}
function wetLabel(n){return n===5?'Fully aquatic':n===4?'Mostly water':n===3?'Wet sections':n===2?'Slightly damp':'Dry'}
function sizeLabel(n){return n>=9?'Enormous':n>=7?'Very large':n>=5?'Large':n>=3?'Medium':'Small'}

// ── SHOW DETAIL ──
let activeTabId=null;
function showDetail(id){
  selId=id;
  const c=CAVES.find(x=>x.id===id);
  // update marker icons
  CAVES.forEach(x=>{if(mkrs[x.id])mkrs[x.id].setIcon(makeIcon(x,x.id===id));});

      <div class="abar ${c.access}">
        <div style="font-size:16px">${ac.bi}</div>
        <div><div class="abar-lbl">${ac.l}</div><div class="abar-sub">${ACCD[c.access]}</div></div>
      </div>
      <div class="srow">
        <div class="scell"><div class="slabel">Epic</div><div class="sval s-epic">${c.epic}/10</div>${scoreBar(c.epic,10,'#fbbf24')}<div style="font-size:10px;color:var(--t4);margin-top:3px">${epicLabel(c.epic)}</div></div>
        <div class="scell"><div class="slabel">Danger</div><div class="sval s-danger">${c.danger}/10</div>${scoreBar(c.danger,10,'#f87171')}<div style="font-size:10px;color:var(--t4);margin-top:3px">${dangerLabel(c.danger)}</div></div>
        <div class="scell"><div class="slabel">Size</div><div class="sval s-size">${c.size}/10</div>${scoreBar(c.size,10,'#67e8f9')}<div style="font-size:10px;color:var(--t4);margin-top:3px">${sizeLabel(c.size)}</div></div>
        <div class="scell"><div class="slabel">Wet</div><div class="sval s-wet">${c.wet}/5</div>${scoreBar(c.wet,5,'#60a5fa')}<div style="font-size:10px;color:var(--t4);margin-top:3px">${wetLabel(c.wet)}</div></div>
      </div>
      <div class="sgrid">
        <div class="sc"><div class="sl">Duration</div><div class="sv">${c.duration}</div></div>
        <div class="sc"><div class="sl">Temperature</div><div class="sv">${c.temp}</div></div>
        <div class="sc"><div class="sl">Price</div><div class="sv">${c.price}</div></div>
        <div class="sc"><div class="sl">Depth</div><div class="sv">${c.depth}</div></div>
        <div class="sc"><div class="sl">Length</div><div class="sv">${c.length}</div></div>
        <div class="sc"><div class="sl">Distance</div><div class="sv">~${c.km}km</div></div>
      </div>
      <div class="tabs">
        <div class="tab on" onclick="switchTab('overview',this)">Overview</div>
        <div class="tab" onclick="switchTab('access',this)">Access</div>
        ${opHtml?'<div class="tab" onclick="switchTab(\'activities\',this)">Activities</div>':''}
        ${commHtml?'<div class="tab" onclick="switchTab(\'community\',this)">Reports</div>':''}
      </div>
      <div id="tp-overview" class="tabp on">
        <div style="padding-top:10px">
          <div class="sec"><div class="sh">📖 About</div><p>${c.desc}</p></div>
          ${c.hours?`<div class="sec"><div class="sh">🕐 Opening Hours & Dates</div><p>${c.hours}</p></div>`:''}
          ${seasonHtml}
          ${airHtml}
          ${vidHtml}
        </div>
      </div>
      <div id="tp-access" class="tabp">
        <div style="padding-top:10px">
          ${riskHtml}
          ${permitHtml}
          <div class="sec"><div class="sh">✅ Requirements</div><ul class="rlist">${(c.requirements||['No special requirements listed']).map(r=>`<li>${r}</li>`).join('')}</ul></div>
          <a class="dirbtn" href="${mapsUrl}" target="_blank"><span>🗺️</span><span>Directions from Valencia</span><span style="margin-left:auto;opacity:.5">→</span></a>
          <div class="sec"><div class="sh">📍 Nearby</div><p>${c.nearby}</p></div>
          <div class="sec"><div class="sh">🔗 Official Info</div><a class="slink" href="${c.url}" target="_blank">Visit source →</a></div>
          <div class="embox">🚨 <strong>Emergency: 112</strong> · Speleology rescue: specify "rescate espeleológico"<br>🏛️ FECV: <strong>espeleocv.org.es</strong></div>
        </div>
      </div>
      ${opHtml?`<div id="tp-activities" class="tabp"><div style="padding-top:10px">${opHtml}</div></div>`:''}
      ${commHtml?`<div id="tp-community" class="tabp"><div style="padding-top:10px">${commHtml}</div></div>`:''}
    </div>`;
}

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tabp').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  const tp=document.getElementById('tp-'+name);
  if(tp)tp.classList.add('on');
}

function closeDetail(){
  selId=null;
  CAVES.forEach(x=>{if(mkrs[x.id])mkrs[x.id].setIcon(makeIcon(x,false));});
  CAVES.forEach(x=>drawEntrances(x,false));
  document.getElementById('pdetail').classList.remove('on');
  document.getElementById('plist').style.display='';
  document.querySelectorAll('.ci').forEach(el=>el.classList.remove('sel'));
  map.flyTo([39.4,-0.55],9,{duration:1});
}

// ── SIZE RANKING ──
// Show size ranking on hover in list: sorted by size_score descending, display rank in list
function addRankBadges(){
  const sorted=[...CAVES].sort((a,b)=>b.size-a.size);
  sorted.forEach((c,i)=>{
    const el=document.getElementById('li-'+c.id);
    if(el&&i<10){
      const badge=document.createElement('div');
      badge.style.cssText='font-size:8px;color:var(--t4);flex-shrink:0;margin-top:3px';
      badge.title='Size rank #'+(i+1);
      if(i===0)badge.textContent='#1 🏆';
      el.appendChild(badge);
    }
  });
}

buildList();
setTimeout(addRankBadges,50);
</script>
</body>
</html>
