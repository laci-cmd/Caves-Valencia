<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>
:root {
  --bg:#0a0908;--surface:#141210;--surface2:#1c1917;--border:#2c2825;--border2:#3d3835;
  --text:#e8e4df;--text2:#a39c96;--text3:#6b635d;
  --amber:#d97706;--amber-light:#fbbf24;
  --green:#16a34a;--green-light:#4ade80;
  --blue:#1d4ed8;--blue-light:#60a5fa;
  --yellow:#b45309;--yellow-light:#fcd34d;
  --red:#991b1b;--red-light:#f87171;
  --purple:#7c3aed;--purple-light:#c4b5fd;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:100}
.header-title{flex:1}
.header-title h1{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.header-title p{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.05em}
.legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);letter-spacing:.03em}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.25)}

.main{display:flex;flex:1;overflow:hidden}
#map{flex:0 0 56%;position:relative}
.panel{flex:1;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

.filter-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.filter-bar input{background:var(--surface);border:1px solid var(--border2);border-radius:5px;padding:5px 10px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text);width:130px;outline:none}
.filter-bar input::placeholder{color:var(--text3)}
.fbtn{padding:4px 10px;border-radius:5px;border:1px solid var(--border2);cursor:pointer;font-size:10px;font-family:'DM Mono',monospace;background:var(--surface);color:var(--text2);font-weight:400;letter-spacing:.03em;transition:all .15s}
.fbtn:hover{color:var(--text)}
.fbtn.active{background:var(--amber);color:#fff;border-color:var(--amber)}
.cave-count{font-size:10px;color:var(--text3);margin-left:auto}

.panel-list{overflow-y:auto;flex:1}
.cave-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;display:flex;gap:10px;align-items:flex-start}
.cave-item:hover{background:var(--surface2)}
.cave-item.selected{background:#1a1100;border-left:3px solid var(--amber)}
.cave-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;border:1.5px solid rgba(255,255,255,.2)}
.cave-info{flex:1;min-width:0}
.cave-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cave-sub{font-size:10px;color:var(--text3);margin-top:2px}
.cave-km{color:var(--amber-light)}
.acc-pill{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;flex-shrink:0;margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.acc-free{background:#052e16;color:var(--green-light)}
.acc-tourist{background:#0c1a3e;color:var(--blue-light)}
.acc-permit{background:#1c0f00;color:var(--yellow-light)}
.acc-closed{background:#2d0000;color:var(--red-light)}

.panel-detail{flex:1;overflow-y:auto;display:none;flex-direction:column}
.panel-detail.active{display:flex}

.detail-photo{width:100%;height:175px;object-fit:cover;display:block;background:var(--surface2)}
.detail-photo-placeholder{width:100%;height:110px;background:linear-gradient(135deg,#1a1510,#2a1f15);display:flex;align-items:center;justify-content:center;font-size:36px}
.detail-body{padding:16px;flex:1}

.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:5px;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px;margin-bottom:14px;transition:color .15s;letter-spacing:.03em}
.back-btn:hover{color:var(--text)}

.detail-name{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:4px}
.detail-location{font-size:11px;color:var(--text2);margin-bottom:6px}
.detail-km{color:var(--amber-light);font-weight:700}
.detail-type{font-size:10px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.detail-highlight{font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--amber-light);margin-bottom:12px;line-height:1.5;border-left:2px solid var(--amber);padding-left:10px}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
.stat-cell{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px}
.stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.stat-value{font-size:11px;color:var(--text);font-weight:700}

.access-bar{border-radius:6px;padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.access-bar.free{background:#052e16;border:1px solid #14532d}
.access-bar.tourist{background:#0c1a3e;border:1px solid #1e3a8a}
.access-bar.permit{background:#1c0f00;border:1px solid #78350f}
.access-bar.closed{background:#2d0000;border:1px solid #7f1d1d}
.access-bar-icon{font-size:16px}
.access-bar-text{flex:1}
.access-bar-label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.access-bar.free .access-bar-label{color:var(--green-light)}
.access-bar.tourist .access-bar-label{color:var(--blue-light)}
.access-bar.permit .access-bar-label{color:var(--yellow-light)}
.access-bar.closed .access-bar-label{color:var(--red-light)}
.access-bar-desc{font-size:11px;color:var(--text2);margin-top:2px}

.section{margin-bottom:12px}
.section-title{font-size:9px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.section p{font-size:12px;color:var(--text2);line-height:1.7}
.req-list{list-style:none}
.req-list li{font-size:11px;color:var(--text2);padding:3px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;line-height:1.5}
.req-list li:last-child{border-bottom:none}
.req-list li::before{content:"→";color:var(--amber);flex-shrink:0}

.risk-box{background:#1a0404;border:1px solid #7f1d1d;border-radius:6px;padding:10px 12px;margin-bottom:10px}
.risk-box .section-title{color:var(--red-light);border-color:#450a0a}
.risk-box .req-list li::before{color:var(--red-light)}
.risk-box .req-list li{color:#fca5a5;border-color:#450a0a}

.permit-box{background:#140a00;border:1px solid #78350f;border-radius:6px;padding:10px 12px;margin-bottom:10px}
.permit-box .section-title{color:var(--yellow-light);border-color:#431407}
.permit-box p{font-size:11px;color:#fcd34d;line-height:1.7}

/* Community notes */
.community-box{background:#0c0c1a;border:1px solid #2d2d5e;border-radius:6px;padding:10px 12px;margin-bottom:10px}
.community-box .section-title{color:var(--purple-light);border-color:#2d2d5e}
.community-note{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #1a1a3a}
.community-note:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.community-note-text{font-size:11px;color:#c4b5fd;line-height:1.6;margin-bottom:4px}
.community-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.source-tag{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;letter-spacing:.04em}
.src-tripadvisor{background:#1a2a1a;color:#4ade80}
.src-forum{background:#1a1a2a;color:#818cf8}
.src-official{background:#1a1200;color:#fcd34d}
.src-rescue{background:#2d0000;color:#f87171}
.src-wikiloc{background:#1a2a2a;color:#22d3ee}
.src-unverified{background:#2a2a2a;color:#a8a29e}
.reliability{font-size:9px;color:var(--text3);letter-spacing:.03em}

.directions-btn{display:flex;align-items:center;gap:8px;background:#0c2044;border:1px solid #1e3a8a;border-radius:6px;padding:9px 12px;color:var(--blue-light);font-family:'DM Mono',monospace;font-size:11px;text-decoration:none;margin-bottom:10px;transition:background .15s;cursor:pointer}
.directions-btn:hover{background:#112a5e}

.season-row{display:flex;gap:3px;margin-top:6px}
.month-cell{flex:1;height:18px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.month-good{background:#052e16;color:var(--green-light)}
.month-ok{background:#1c1500;color:var(--yellow-light)}
.month-bad{background:#2d0000;color:var(--red-light)}
.month-closed{background:#1a1a1a;color:var(--text3)}

.site-link{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--blue-light);text-decoration:none;border-bottom:1px solid #1e3a8a;padding-bottom:1px}
.site-link:hover{color:#93c5fd}

.emergency-box{background:var(--surface2);border-radius:6px;padding:9px 12px;margin-top:6px;font-size:11px;color:var(--text3);border:1px solid var(--border)}
.emergency-box strong{color:var(--text2)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.leaflet-control-layers{background:var(--surface2)!important;border:1px solid var(--border)!important;color:var(--text2)!important;font-family:'DM Mono',monospace!important;font-size:11px!important}
.leaflet-control-layers-expanded{padding:8px 12px!important}
.leaflet-control-scale-line{background:rgba(20,18,16,.85)!important;border:1px solid var(--border2)!important;color:var(--text2)!important;font-family:'DM Mono',monospace!important;font-size:10px!important;padding:2px 5px!important}
.leaflet-popup-content-wrapper{background:var(--surface2)!important;border:1px solid var(--border2)!important;color:var(--text)!important;font-family:'DM Mono',monospace!important;font-size:11px!important;border-radius:6px!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important}
.leaflet-popup-tip{background:var(--surface2)!important}
.leaflet-popup-close-button{color:var(--text2)!important}

@media(max-width:700px){.main{flex-direction:column}#map{flex:0 0 45vh}.panel{flex:1}.legend{display:none}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<header>

<div class="main">
  <div id="map"></div>
  <div class="panel">

      <button class="fbtn" onclick="setFilter('permit')" id="f-permit">🟡 Permit</button>
      <button class="fbtn" onclick="setFilter('closed')" id="f-closed">🔴 Closed</button>
      <span class="cave-count" id="count"></span>
    </div>
    <div class="panel-list" id="panel-list"></div>
    <div class="panel-detail" id="panel-detail"></div>
  </div>
</div>

const ACCESS={
  free:{color:"#16a34a",label:"Free Access",icon:"🟢",badgeClass:"acc-free",barIcon:"✅"},
  tourist:{color:"#1d4ed8",label:"Tourist (ticket)",icon:"🔵",badgeClass:"acc-tourist",barIcon:"🎫"},
  permit:{color:"#d97706",label:"Permit Required",icon:"🟡",badgeClass:"acc-permit",barIcon:"📋"},
  closed:{color:"#dc2626",label:"Closed/Dangerous",icon:"🔴",badgeClass:"acc-closed",barIcon:"⛔"}
};
const ACCESS_DESC={
  free:"No ticket, no booking required. Show up and explore.",
  tourist:"Buy a ticket at the entrance or online. Guided visits available.",
  permit:"Written permit or booking from authorities required before visiting.",
  closed:"No public access. Do not attempt entry."
};
const MONTHS=["J","F","M","A","M","J","J","A","S","O","N","D"];

const map=L.map('map',{zoomControl:true}).setView([39.4,-0.55],9);
const tiles_topo=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{attribution:'© OpenTopoMap, © OpenStreetMap',maxZoom:17});
const tiles_sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri, Maxar',maxZoom:19});
const tiles_osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19});
tiles_topo.addTo(map);
L.control.layers({"🗺️ Topographic":tiles_topo,"🛰️ Satellite":tiles_sat,"🏙️ Streets":tiles_osm},{},{position:'topright'}).addTo(map);
L.control.scale({imperial:false,metric:true,position:'bottomleft'}).addTo(map);

fetch("https://terramapas.icv.gva.es/spa_icv_eepp_cuevas?service=WFS&version=2.0.0&request=GetFeature&outputFormat=application/json&srsname=EPSG:4326")
  .then(r=>r.json()).then(data=>{
    if(!data.features)return;
    L.geoJSON(data.features,{
      pointToLayer:(f,ll)=>L.circleMarker(ll,{radius:4,fillColor:"#7c3aed",color:"#fff",weight:1,opacity:.7,fillOpacity:.4}),
      onEachFeature:(f,layer)=>{
        const n=f.properties.nombre||f.properties.NOMBRE||f.properties.name||"Cueva GVA";
        layer.bindPopup(`<b>${n}</b><br><small style="color:#a39c96">GVA official catalogue</small>`);
      }
    }).addTo(map);
  }).catch(()=>{});

const cluster=L.markerClusterGroup({maxClusterRadius:35,iconCreateFunction:c=>L.divIcon({html:`<div style="background:#1c1917;border:2px solid #d97706;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:DM Mono,monospace;font-size:11px;color:#fbbf24;font-weight:700">${c.getChildCount()}</div>`,iconSize:[28,28],iconAnchor:[14,14]})});
const markers={};
caves.forEach(c=>{
  const col=ACCESS[c.access].color;
  const marker=L.circleMarker([c.lat,c.lng],{radius:10,fillColor:col,color:"#fff",weight:2,opacity:1,fillOpacity:.9});
  marker.bindTooltip(`<div style="font-family:DM Mono,monospace;font-size:11px"><b style="font-size:12px">${c.name}</b><br><span style="color:#a39c96">${c.town} · ${c.km}km</span><br><span style="color:${col}">${ACCESS[c.access].label}</span></div>`,{sticky:true});
  marker.on('click',()=>showDetail(c.id));
  cluster.addLayer(marker);
  markers[c.id]=marker;
});
map.addLayer(cluster);

let activeFilter='all',selectedId=null;

function filterList(){
  const q=document.getElementById('search').value.toLowerCase();
  let n=0;
  document.querySelectorAll('.cave-item').forEach(el=>{
    const id=parseInt(el.dataset.id);
    const c=caves.find(x=>x.id===id);
    const mf=activeFilter==='all'||c.access===activeFilter;
    const ms=!q||c.name.toLowerCase().includes(q)||c.town.toLowerCase().includes(q)||c.type.toLowerCase().includes(q);
    el.style.display=mf&&ms?'':'none';
    if(mf&&ms)n++;
  });
  document.getElementById('count').textContent=n+' shown';
}
function setFilter(f){
  activeFilter=f;
  ['all','free','tourist','permit','closed'].forEach(x=>document.getElementById('f-'+x).classList.toggle('active',f===x));
  filterList();
}
function buildList(){
  const el=document.getElementById('panel-list');
  el.innerHTML='';
  const sorted=[...caves].sort((a,b)=>a.km-b.km);
  sorted.forEach(c=>{
    const div=document.createElement('div');
    div.className='cave-item';div.dataset.id=c.id;
    const acc=ACCESS[c.access];
    div.innerHTML=`<div class="cave-dot" style="background:${acc.color}"></div><div class="cave-info"><div class="cave-name">${c.name}</div><div class="cave-sub">${c.town} · <span class="cave-km">~${c.km}km</span> · ${c.type}</div></div><div class="acc-pill ${acc.badgeClass}">${acc.label}</div>`;
    div.onclick=()=>showDetail(c.id);
    el.appendChild(div);
  });
  filterList();
}
function seasonCell(code,month){
  const cls=code===1?'month-good':code===2?'month-ok':'month-bad';
  return`<div class="month-cell ${cls}">${month}</div>`;
}
function communityHtml(community){
  if(!community||community.length===0)return'';
  const notes=community.map(n=>`
    <div class="community-note">
      <div class="community-note-text">${n.text}</div>
      <div class="community-meta">
        <span class="source-tag ${n.srcClass}">${n.source}</span>
        <span class="reliability">${n.reliability}</span>
      </div>
    </div>`).join('');
  return`<div class="community-box"><div class="section-title">💬 Community Reports & Real Visitor Notes</div>${notes}</div>`;
}
function showDetail(id){
  selectedId=id;
  const c=caves.find(x=>x.id===id);
  const acc=ACCESS[c.access];
  document.querySelectorAll('.cave-item').forEach(el=>el.classList.toggle('selected',parseInt(el.dataset.id)===id));
  map.flyTo([c.lat,c.lng],13,{duration:1.3});
  const photoHtml=c.photo?`<img class="detail-photo" src="${c.photo}" alt="${c.name}" onerror="this.style.display='none'">`:`<div class="detail-photo-placeholder">${c.access==='closed'?'⛔':c.access==='permit'?'📋':c.access==='tourist'?'🎫':'🟢'}</div>`;
  const riskHtml=c.risks.length?`<div class="risk-box"><div class="section-title">⚠️ Risks & Dangers</div><ul class="req-list">${c.risks.map(r=>`<li>${r}</li>`).join('')}</ul></div>`:'';
  const permitHtml=c.permit_info?`<div class="permit-box"><div class="section-title">📋 How to Get Access / Permit</div><p>${c.permit_info}</p></div>`:'';
  const hoursHtml=c.hours?`<div class="section"><div class="section-title">🕐 Hours & Dates</div><p>${c.hours}</p></div>`:'';
  const mapsUrl=`https://www.google.com/maps/dir/?api=1&origin=Valencia,Spain&destination=${c.lat},${c.lng}&travelmode=driving`;
  const det=document.getElementById('panel-detail');
  const lst=document.getElementById('panel-list');
  det.classList.add('active');lst.style.display='none';
  det.innerHTML=`
    ${photoHtml}
    <div class="detail-body">
      <button class="back-btn" onclick="closeDetail()">← Back to list</button>
      <div class="detail-type">${c.type}</div>
      <div class="detail-name">${c.name}</div>
      <div class="detail-location">${c.town} · ${c.province} · <span class="detail-km">~${c.km} km from Valencia</span></div>
      <div class="detail-highlight">${c.highlight}</div>
      <div class="access-bar ${c.access}">
        <div class="access-bar-icon">${acc.barIcon}</div>
        <div class="access-bar-text">
          <div class="access-bar-label">${acc.label}</div>
          <div class="access-bar-desc">${ACCESS_DESC[c.access]}</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-cell"><div class="stat-label">Duration</div><div class="stat-value">${c.duration}</div></div>
        <div class="stat-cell"><div class="stat-label">Temperature</div><div class="stat-value">${c.temp}</div></div>
        <div class="stat-cell"><div class="stat-label">Price</div><div class="stat-value">${c.price}</div></div>
        <div class="stat-cell"><div class="stat-label">Depth</div><div class="stat-value">${c.depth}</div></div>
        <div class="stat-cell"><div class="stat-label">Length</div><div class="stat-value">${c.length}</div></div>
        <div class="stat-cell"><div class="stat-label">Distance</div><div class="stat-value">~${c.km} km</div></div>
      </div>
      <div class="section"><div class="section-title">📖 About</div><p>${c.desc}</p></div>
      ${hoursHtml}
      ${riskHtml}
      ${communityHtml(c.community)}
      ${permitHtml}
      <div class="section"><div class="section-title">✅ Requirements & Access</div><ul class="req-list">${c.requirements.map(r=>`<li>${r}</li>`).join('')}</ul></div>
      <div class="section"><div class="section-title">🗓️ Best Season</div>
        <div class="season-row">${c.season.map((s,i)=>seasonCell(s,MONTHS[i])).join('')}</div>
        <div style="display:flex;gap:12px;margin-top:5px;font-size:9px;color:var(--text3)">
          <span style="color:#4ade80">■ Good</span><span style="color:#fcd34d">■ Caution</span><span style="color:#f87171">■ Avoid/Closed</span>
        </div>
      </div>
      <a class="directions-btn" href="${mapsUrl}" target="_blank">
        <span>🗺️</span><span>Directions from Valencia (Google Maps)</span><span style="margin-left:auto;opacity:.5">→</span>
      </a>
      <div class="section"><div class="section-title">📍 Nearby</div><p>${c.nearby}</p></div>
      <div class="section"><div class="section-title">🔗 Official Info</div><a class="site-link" href="${c.url}" target="_blank">Visit official source →</a></div>
      <div class="emergency-box">🚨 <strong>Emergency Spain: 112</strong> · Speleology rescue: call 112, specify "rescate espeleológico"<br>🏛️ FECV: <strong>espeleocv.org.es</strong> · Cova Tallada permits: <strong>covatallada.org/reservas</strong></div>
    </div>`;
}
function closeDetail(){
  document.getElementById('panel-detail').classList.remove('active');
  document.getElementById('panel-list').style.display='';
  selectedId=null;
  document.querySelectorAll('.cave-item').forEach(el=>el.classList.remove('selected'));
  map.flyTo([39.4,-0.55],9,{duration:1});
}
buildList();
</script>
</body>
</html>
